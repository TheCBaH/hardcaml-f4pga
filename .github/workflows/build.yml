name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v3
    - name: devcontainer
      uses: ./.github/workflows/actions/devcontainer
      id: devcontainer
    - name: setup
      run: |
        echo 'EXEC=${{ steps.devcontainer.outputs.exec }}' >> $GITHUB_ENV
    - name: hardcaml
      run: |
        ${{ env.EXEC }} make rtl
    - name: f4pga basys3
      run: |
        ${{ env.EXEC }} make design.basys3
    - name: f4pga art_35
      run: |
        ${{ env.EXEC }} make design.arty_35
