name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v3
    - name: devcontainer
      uses: ./.github/workflows/actions/devcontainer
      if: matrix.host == 'devcontainer'
      id: devcontainer
    - name: setup
      run: |
        host="${{ matrix.host }}"
        case "$host" in
        devcontainer)
          echo 'EXEC=${{ steps.devcontainer.outputs.exec }}' >> $GITHUB_ENV
          ;;
        esac
