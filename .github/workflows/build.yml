name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v3
    - name: devcontainer
      uses: ./.github/workflows/actions/devcontainer
      id: devcontainer
    - name: setup
      run: |
        echo 'EXEC=${{ steps.devcontainer.outputs.exec }}' >> $GITHUB_ENV
    - name: hardcaml
      run: |
        id
        ${{ env.EXEC }} ls -al /opt/opam/log/
        ${{ env.EXEC }} id
        ${{ env.EXEC }} touch /opt/opam/log/foo-bar
        ${{ env.EXEC }} make rtl
    - name: f4pga basys3
      run: |
        ${{ env.EXEC }} make basys3.design
    - name: f4pga art_35
      run: |
        ${{ env.EXEC }} make arty_35.design
